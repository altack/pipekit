name: hello
version: 0.1.0
description: Smoke test of the pipekit agent contract — reads name, writes greeting.
prompt: ./prompt.md

requires:
  env: [ANTHROPIC_API_KEY, OPENAI_API_KEY, GH_TOKEN]

agents:
  preferred: [claude-code]
  models:
    claude-code: opus

inputs:
  schema:
    type: object
    additionalProperties: false
    properties:
      name: { type: string }
      fail: { type: boolean }
